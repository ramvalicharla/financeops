# financeops-api service manifest (Railway reads one manifest per service).
# For worker/beat, point each Railway service to:
# - /railway.worker.toml
# - /railway.beat.toml
# Note: Railway config-as-code currently supports build/deploy settings only.
# Environment variables should be set in the Railway Variables UI or imported
# from /railway.env.production.

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"
watchPatterns = ["backend/**"]

[deploy]
startCommand = "uvicorn financeops.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
