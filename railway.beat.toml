# financeops-beat service manifest

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile.beat"
watchPatterns = ["backend/**"]

[deploy]
startCommand = "celery -A financeops.tasks.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule"
healthcheckPath = null
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
