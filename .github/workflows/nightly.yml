name: Nightly Backend Verification

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  nightly-backend:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Full Backend Suite
            command: python -m pytest -n 9 --dist loadfile -q
          - name: Slow Backend Slice
            command: python -m pytest -m "slow" -n 9 --dist loadfile -q
          - name: DB Heavy Backend Slice
            command: python -m pytest -m "db_heavy" -n 9 --dist loadfile -q
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: financeops_test
          POSTGRES_USER: financeops_test
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U financeops_test -d financeops_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DEBUG: "false"
      REDIS_URL: redis://localhost:6380/0
      TEST_REDIS_URL: redis://localhost:6380/0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/pyproject.toml', 'backend/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Wait for services
        run: |
          python - <<'PY'
          import socket
          import time

          targets = [("127.0.0.1", 5433), ("127.0.0.1", 6380)]
          deadline = time.time() + 120
          while time.time() < deadline:
              pending = []
              for host, port in targets:
                  try:
                      with socket.create_connection((host, port), timeout=1):
                          pass
                  except OSError:
                      pending.append((host, port))
              if not pending:
                  raise SystemExit(0)
              time.sleep(2)
          raise SystemExit(f"Timed out waiting for services: {pending}")
          PY

      - name: Run nightly backend command
        working-directory: backend
        run: |
          unset DATABASE_URL TEST_DATABASE_URL MIGRATION_DATABASE_URL
          ${{ matrix.command }}
