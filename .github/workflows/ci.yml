name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        # postgres:16-compatible image with pgvector preinstalled for the backend suite
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: financeops_test
          POSTGRES_USER: financeops_test
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U financeops_test -d financeops_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DEBUG: "false"
      REDIS_URL: redis://localhost:6380/0
      TEST_REDIS_URL: redis://localhost:6380/0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/pyproject.toml', 'backend/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          # TODO: switch to `uv sync --extra dev --locked` once the locked
          # environment passes pytest with the repo's asyncio config unchanged.
          pip install -e ".[dev]"

      - name: Check for float usage in financial fields
        working-directory: backend
        run: |
          if grep -rn "float(" financeops/modules/ \
              --include="*.py" \
              --exclude-dir=tests \
              | grep -v "confidence\|probability\|score\|#" \
              | grep -i "debit\|credit\|amount\|balance\|total\|tax\|gst"; then
            echo "ERROR: float() used for financial amount - use Decimal instead"
            exit 1
          fi

      - name: Wait for services
        run: |
          python - <<'PY'
          import socket
          import time

          targets = [("127.0.0.1", 5433), ("127.0.0.1", 6380)]
          deadline = time.time() + 120
          while time.time() < deadline:
              pending = []
              for host, port in targets:
                  try:
                      with socket.create_connection((host, port), timeout=1):
                          pass
                  except OSError:
                      pending.append((host, port))
              if not pending:
                  raise SystemExit(0)
              time.sleep(2)
          raise SystemExit(f"Timed out waiting for services: {pending}")
          PY

      - name: Run backend fast suite
        if: github.event_name == 'pull_request'
        working-directory: backend
        run: |
          unset DATABASE_URL TEST_DATABASE_URL MIGRATION_DATABASE_URL
          python -m pytest -m "not slow" -n 6 --dist loadfile --tb=short -q --cov=financeops --cov-report=xml --cov-fail-under=70

      - name: Run backend full suite
        if: github.event_name == 'push'
        working-directory: backend
        run: |
          unset DATABASE_URL TEST_DATABASE_URL MIGRATION_DATABASE_URL
          python -m pytest -n 9 --dist loadfile --tb=short -q --cov=financeops --cov-report=xml --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

      - name: Dependency vulnerability scan
        continue-on-error: true
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit --desc on

  frontend-build:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        id: node-cache
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node20-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install frontend dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps webkit

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --run

      - name: Run typecheck
        working-directory: frontend
        run: npx tsc --noEmit
