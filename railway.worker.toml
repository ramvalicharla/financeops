# financeops-worker service manifest

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile.worker"
watchPatterns = ["backend/**"]

[deploy]
startCommand = "celery -A financeops.tasks.celery_app worker --loglevel=info --concurrency=4 -Q critical_q,high_q,normal_q,low_q"
healthcheckPath = null
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
