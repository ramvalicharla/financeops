services:
  db:
    image: pgvector/pgvector:pg16
    env_file: ../.env
    environment:
      POSTGRES_DB: financeops
      POSTGRES_USER: financeops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financeops"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    env_file: ../.env
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping --no-auth-warning"]
      interval: 5s
      timeout: 5s
      retries: 5

  clamav:
    image: clamav/clamav:stable
    container_name: finos-clamav
    volumes:
      - clamav_data:/var/lib/clamav
      - /var/run/clamav:/var/run/clamav
    environment:
      - CLAMAV_NO_FRESHCLAMD=false
    healthcheck:
      test: ["CMD", "clamdcheck"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  temporal_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: temporal
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.25.2
    depends_on:
      temporal_db:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal_db
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig/docker.yaml
    ports:
      - "7233:7233"

  temporal_ui:
    image: temporalio/ui:2.34.0
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000,http://localhost:8000
    ports:
      - "8088:8080"

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: ../.env
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_started
    volumes:
      - ../backend:/app
    command: uvicorn financeops.main:app --host 0.0.0.0 --port 8000 --reload

  temporal_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file: ../.env
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      temporal:
        condition: service_started
    volumes:
      - ../backend:/app
    command: python -m financeops.temporal.worker

  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    command: >
      celery -A financeops.tasks.celery_app worker
      --queues critical_q,high_q,normal_q,low_q
      --concurrency 4
      --loglevel info

  celery_beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file: ../.env
    depends_on:
      - redis
    volumes:
      - ../backend:/app
    command: celery -A financeops.tasks.celery_app beat --loglevel info

  flower:
    image: mher/flower:2.0
    ports:
      - "5555:5555"
    env_file: ../.env
    depends_on:
      - redis
    command: celery flower --broker=${REDIS_URL}

volumes:
  postgres_data:
  redis_data:
  clamav_data:
