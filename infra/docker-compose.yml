services:
  db:
    image: pgvector/pgvector:pg16
    env_file: ../.env
    environment:
      POSTGRES_DB: financeops
      POSTGRES_USER: financeops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financeops"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    env_file: ../.env
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping --no-auth-warning"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    command: uvicorn financeops.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    command: >
      celery -A financeops.tasks.celery_app worker
      --queues critical_q,high_q,normal_q,low_q
      --concurrency 4
      --loglevel info

  celery_beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file: ../.env
    depends_on:
      - redis
    volumes:
      - ../backend:/app
    command: celery -A financeops.tasks.celery_app beat --loglevel info

  flower:
    image: mher/flower:2.0
    ports:
      - "5555:5555"
    env_file: ../.env
    depends_on:
      - redis
    command: celery flower --broker=${REDIS_URL}

volumes:
  postgres_data:
  redis_data:
