services:
  db_test:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: financeops_test
      POSTGRES_USER: financeops_test
      POSTGRES_PASSWORD: testpassword
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financeops_test"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis_test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: redis-server
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
