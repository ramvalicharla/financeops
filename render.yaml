services:
  - type: web
    name: financeops-backend
    runtime: docker
    region: singapore
    plan: starter
    dockerfilePath: backend/Dockerfile
    dockerCommand: bash scripts/start.sh
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_ENVIRONMENT
        value: production
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: FIELD_ENCRYPTION_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: MIGRATION_DATABASE_URL
        sync: false
      - key: DATABASE_POOL_SIZE
        value: "20"
      - key: DATABASE_MAX_OVERFLOW
        value: "10"
      - key: REDIS_URL
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: CLAMAV_REQUIRED
        value: "false"
      - key: SMTP_REQUIRED
        value: "false"

  - type: worker
    name: financeops-worker
    runtime: docker
    region: singapore
    plan: starter
    dockerfilePath: backend/Dockerfile.worker
    dockerCommand: celery -A financeops.tasks.celery_app worker --loglevel=info --concurrency=4 -Q critical_q,high_q,normal_q,low_q
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_ENVIRONMENT
        value: production
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: FIELD_ENCRYPTION_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_POOL_SIZE
        value: "20"
      - key: DATABASE_MAX_OVERFLOW
        value: "10"
      - key: REDIS_URL
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: CLAMAV_REQUIRED
        value: "false"
      - key: SMTP_REQUIRED
        value: "false"

  - type: worker
    name: financeops-beat
    runtime: docker
    region: singapore
    plan: starter
    dockerfilePath: backend/Dockerfile.beat
    dockerCommand: celery -A financeops.tasks.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_ENVIRONMENT
        value: production
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: FIELD_ENCRYPTION_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_POOL_SIZE
        value: "20"
      - key: DATABASE_MAX_OVERFLOW
        value: "10"
      - key: REDIS_URL
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: CLAMAV_REQUIRED
        value: "false"
      - key: SMTP_REQUIRED
        value: "false"
