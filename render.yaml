services:
  - type: web
    name: financeops-backend
    runtime: docker
    region: singapore
    plan: starter
    dockerfilePath: backend/Dockerfile
    healthCheckPath: /ready
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FIELD_ENCRYPTION_KEY
        sync: false

  - type: worker
    name: financeops-worker
    runtime: docker
    region: singapore
    plan: starter
    dockerfilePath: backend/Dockerfile.worker
    dockerCommand: celery -A financeops.tasks.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: worker
    name: financeops-beat
    runtime: docker
    region: singapore
    plan: starter
    dockerfilePath: backend/Dockerfile.beat
    dockerCommand: celery -A financeops.tasks.celery_app beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
